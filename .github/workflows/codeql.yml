name: "CodeQL"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly, Sunday 07:13 UTC (low-traffic time, off the top of the hour).
    - cron: "13 7 * * 0"

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      # build-mode: manual is required for this project because JPEGView is an
      # MSBuild/v143 native solution that CodeQL's autobuild cannot configure
      # reliably (WTL submodule + WiX installer project). We drive the build
      # ourselves below, between init and analyze, and limit it to /target:JPEGView
      # so CodeQL traces only the application (not the WiX installer), avoiding the
      # WiX toolset dependency entirely.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: manual

      - name: Init WTL submodule
        run: git submodule update --init deps/WTL-sf

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: "[17.0,18.0)"
          msbuild-architecture: x64

      # CodeQL manual build-mode requires the actual compile to happen here,
      # between init and analyze, so the extractor can observe the build.
      - name: Build JPEGView (Release x64)
        run: msbuild /target:JPEGView /property:Platform=x64 /property:Configuration=Release /property:PlatformToolset=v143 src\JPEGView.sln

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
