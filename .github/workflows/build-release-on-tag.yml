name: Publish Release on tag

# Push a version tag (e.g. v1.4.0) to build a Release x64 binary and attach it,
# plus the installer, to a GitHub Release on the Releases page:
#   git tag v1.4.0 && git push origin v1.4.0
on:
  push:
    tags:
      - 'v*'

# gh release create needs write access to repo contents
permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x64

      - uses: ./.github/actions/setup-wix

      - uses: ./.github/actions/wtl-submodule

      - name: Build x64 Release
        uses: ./.github/actions/build-solution
        with:
          platform-arch: x64
          build-config: Release
          # keep the real committed version string for a tagged release (no GHdevtest suffix)
          patch-version: false

      - name: Package portable zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $relDir = "src/JPEGView/bin/x64/Release"
          # drop developer-only files so the portable zip matches the normal CI artifact contents
          Get-ChildItem -Path $relDir -Recurse -Include *.pdb, *.exp, *.lib -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue
          $portable = "JPEGView_${tag}_x64_portable.zip"
          Compress-Archive -Path "$relDir/*" -DestinationPath $portable -Force
          "PORTABLE_ZIP=$portable" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = @($env:PORTABLE_ZIP)
          $installer = Get-ChildItem -Path "src/JPEGView.Setup/bin" -Recurse -Include *.exe, *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($installer) {
            $assets += $installer.FullName
          } else {
            Write-Host "::warning::No installer (.exe/.msi) found under src/JPEGView.Setup/bin"
          }
          Write-Host "Publishing release $tag with assets:`n$($assets -join "`n")"
          gh release create $tag $assets --title "JPEGView $tag" --generate-notes
